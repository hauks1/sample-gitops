apiVersion: v1
kind: Secret
metadata:
  name: sample-gitops
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  url: https://github.com/hauks1/sample-gitops
  ## It is a open repo, please refer to https://argo-cd.readthedocs.io/en/stable/operator-manual/argocd-repositories-yaml/ if the repo is not opoen.
  # password: my-password
  # username: my-username
  # bearerToken: my-token
  # project: my-project
  # insecure: "true" # Ignore validity of server's TLS certificate. Defaults to "false"
  # forceHttpBasicAuth: "true" # Skip auth method negotiation and force usage of HTTP basic auth. Defaults to "false"
  # enableLfs: "true" # Enable git-lfs for this repository. Defaults to "false"

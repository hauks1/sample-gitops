apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oc-argcd-demo-projects
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/hauks1/sample-gitops
    targetRevision: main
    path: namespaces/default/projects
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
